            if(usersDB[userBox] && usersDB[userBox].pass === passBox) {
                const userObj = { username: userBox, name: usersDB[userBox].name };
                sessionStorage.setItem('coosajo_logged_user', JSON.stringify(userObj));

        function showApp(user) {
            loginScreen.classList.add('hidden');
            appContent.classList.remove('hidden');

            const names = user.name.split(' ');

        // ==========================================
        // 5. CARGA DE DATOS DESDE FIREBASE
        // ==========================================
        async function loadDataFromFirebase() {
            try {
                // Obtener datos de la colección "reportes"
                const querySnapshot = await getDocs(collection(db, "reportes"));
                appData = {};
                
                querySnapshot.forEach((doc) => {
                    appData[doc.id] = doc.data();
                });

                // MIGRACIÓN: Si Firebase está vacío pero hay datos en localStorage, súbelos.
                const localData = JSON.parse(localStorage.getItem('coosajo_dashboard_data'));
                if (localData && Object.keys(appData).length === 0) {
                    console.log("Migrando datos locales a Firebase...");
                    for (const key in localData) {
                        appData[key] = localData[key];
                        await setDoc(doc(db, "reportes", key), localData[key]);
                    }
                    showToast("¡Tus datos locales fueron respaldados en la nube!");
                }

                // Configurar período inicial
                const keys = Object.keys(appData);
                currentWeek = keys.length > 0 ? keys[keys.length - 1] : ""; // Toma el último

                initAppData();

            } catch (error) {
                console.error("Error cargando Firebase: ", error);
                alert("Error al conectar con la base de datos. Verifica tu configuración de Firebase.");
            }
        }

        window.compressAndPreview = function(input, index) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 250;
                    const scale = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const base64 = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById(`p-img-prev-${index}`).src = base64;
                    document.getElementById(`p-img-data-${index}`).value = base64;
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        // ==========================================
        // 8. LÓGICA PRINCIPAL DEL DASHBOARD
        // ==========================================
        function updatePeriodDatalist() {
            const list = document.getElementById('period-list');
            const sel1 = document.getElementById('comp-period-1');
            const sel2 = document.getElementById('comp-period-2');
            
            list.innerHTML = '';
            if(sel1) sel1.innerHTML = '<option value="">Seleccione Período A</option>';
            if(sel2) sel2.innerHTML = '<option value="">Seleccione Período B</option>';
            
            const keys = Object.keys(appData);

            keys.forEach(key => {
                let opt = document.createElement('option');
                opt.value = key;
                list.appendChild(opt);

                if(sel1) { let o1 = document.createElement('option'); o1.value = key; o1.text = key; sel1.appendChild(o1); }
                if(sel2) { let o2 = document.createElement('option'); o2.value = key; o2.text = key; sel2.appendChild(o2); }
            });

            if (sel1 && sel2 && keys.length > 0) {
                if (keys.length >= 2) {
                    sel1.value = keys[keys.length - 2]; 
                    sel2.value = keys[keys.length - 1]; 
                } else {
                    sel1.value = keys[0];
                    sel2.value = keys[0];
                }
                window.renderComparativa();
            }
        }

        window.loadWeekData = function(weekStr) {
            currentWeek = weekStr;
            inputGlobalWeek.value = weekStr; 
            inputFormWeek.value = weekStr; 
            document.getElementById('dash-week-label').innerText = `Mostrando datos de: ${weekStr}`;

            const data = appData[weekStr];

            if (data) {
                document.getElementById('val-followers').innerText = (data.metrics.followers >= 1000 ? (data.metrics.followers/1000).toFixed(2)+'K' : data.metrics.followers);
                
                const g = data.metrics.gained || 0;
                const l = data.metrics.lost || 0;
                document.getElementById('val-gained').innerText = g;
                document.getElementById('val-lost').innerText = l;
                document.getElementById('val-net').innerText = (g - l > 0 ? '+' : '') + (g - l);

                document.getElementById('val-impressions').innerText = (data.metrics.impressions >= 1000 ? (data.metrics.impressions/1000).toFixed(2)+'K' : data.metrics.impressions);
                document.getElementById('val-interactions').innerText = (data.metrics.interactions >= 1000 ? (data.metrics.interactions/1000).toFixed(2)+'K' : data.metrics.interactions);
                document.getElementById('val-engagement').innerText = data.metrics.engagement;
                document.getElementById('val-posts').innerText = data.metrics.posts;
                document.getElementById('val-views').innerText = (data.metrics.views >= 1000 ? (data.metrics.views/1000).toFixed(2)+'K' : data.metrics.views);
                document.getElementById('val-reactions').innerText = data.metrics.reactions.toLocaleString();
                document.getElementById('val-clicks').innerText = data.metrics.clicks.toLocaleString();

                updateChartData(data.daily);

                document.getElementById('note-impresiones').value = data.notes["note-impresiones"] || "";
                document.getElementById('note-interaccion').value = data.notes["note-interaccion"] || "";
                document.getElementById('note-contenido').value = data.notes["note-contenido"] || "";

                renderTopPostsDisplay(data.topPosts);

            } else {
                ['followers', 'impressions', 'interactions', 'engagement', 'posts', 'views', 'reactions', 'clicks', 'gained', 'lost', 'net'].forEach(id => {
                    let el = document.getElementById('val-' + id);
                    if(el) el.innerText = "-";
                });
                updateChartData([0,0,0,0,0,0,0]);
                document.querySelectorAll('.note-area').forEach(el => el.value = "");
                renderTopPostsDisplay([]);

            loadFormForWeek(weekStr);

        // ==========================================
        // 9. GUARDADO EN FIREBASE

        window.saveNotes = function() {
            if (!currentWeek) return;
            if (!appData[currentWeek]) {
                appData[currentWeek] = { metrics: {}, daily: [], notes: {}, topPosts: [] };
                updatePeriodDatalist(); 
            }
            
            appData[currentWeek].notes["note-impresiones"] = document.getElementById('note-impresiones').value;
            appData[currentWeek].notes["note-interaccion"] = document.getElementById('note-interaccion').value;
            appData[currentWeek].notes["note-contenido"] = document.getElementById('note-contenido').value;
            
            // Retrasar el guardado a Firebase para no saturar con cada pulsación de tecla
            clearTimeout(noteTimeout);
            noteTimeout = setTimeout(async () => {
                try {
                    await setDoc(doc(db, "reportes", currentWeek), appData[currentWeek]);
                    console.log("Notas guardadas en Firebase.");
                } catch (e) { console.error("Error guardando notas", e); }
            }, 1500);
        }

            const data = appData[weekStr];

                document.getElementById('form-followers').value = data.metrics.followers || '';

                document.getElementById('form-lost').value = data.metrics.lost || '';
                document.getElementById('form-impressions').value = data.metrics.impressions || '';
                document.getElementById('form-interactions').value = data.metrics.interactions || '';
                document.getElementById('form-engagement').value = data.metrics.engagement || '';
                document.getElementById('form-posts').value = data.metrics.posts || '';
                document.getElementById('form-views').value = data.metrics.views || '';
                document.getElementById('form-reactions').value = data.metrics.reactions || '';
                document.getElementById('form-clicks').value = data.metrics.clicks || '';
                for(let i=1; i<=7; i++) document.getElementById('d'+i).value = data.daily[i-1] || 0;

                    document.getElementById(`p-img-data-${i}`).value = "";

        btnSaveData.addEventListener('click', async () => {
            const weekToSave = inputFormWeek.value.trim();
            if(!weekToSave) { alert("Por favor asigna un nombre al período (Ej: 20-27 Abr)."); return; }

            const existingNotes = appData[weekToSave] ? appData[weekToSave].notes : {};
            
            const topPostsArray = [];
            for(let i=0; i<10; i++) {
                topPostsArray.push({
                    title: document.getElementById(`p-title-${i}`).value,
                    reach: Number(document.getElementById(`p-reach-${i}`).value) || 0,
                    impressions: Number(document.getElementById(`p-imp-${i}`).value) || 0,
                    interactions: Number(document.getElementById(`p-int-${i}`).value) || 0,
                    engagement: Number(document.getElementById(`p-eng-${i}`).value) || 0,
                    image: document.getElementById(`p-img-data-${i}`).value
                });
            }

            const newData = {
                metrics: {
                    followers: Number(document.getElementById('form-followers').value) || 0,
                    gained: Number(document.getElementById('form-gained').value) || 0,
                    lost: Number(document.getElementById('form-lost').value) || 0,
                    impressions: Number(document.getElementById('form-impressions').value) || 0,
                    interactions: Number(document.getElementById('form-interactions').value) || 0,
                    engagement: Number(document.getElementById('form-engagement').value) || 0,
                    posts: Number(document.getElementById('form-posts').value) || 0,
                    views: Number(document.getElementById('form-views').value) || 0,
                    reactions: Number(document.getElementById('form-reactions').value) || 0,
                    clicks: Number(document.getElementById('form-clicks').value) || 0
                },
                daily: [
                    Number(document.getElementById('d1').value)||0, Number(document.getElementById('d2').value)||0,
                    Number(document.getElementById('d3').value)||0, Number(document.getElementById('d4').value)||0,
                    Number(document.getElementById('d5').value)||0, Number(document.getElementById('d6').value)||0,
                    Number(document.getElementById('d7').value)||0
                ],
                notes: existingNotes,
                topPosts: topPostsArray
            };

            // Modificar memoria local y guardar en Firebase
            appData[weekToSave] = newData;

            try {
                // Almacenamiento en Firestore
                await setDoc(doc(db, "reportes", weekToSave), newData);
                
                updatePeriodDatalist(); 
                if(weekToSave === currentWeek || currentWeek === "") {
                    window.loadWeekData(weekToSave);
                }

                showToast(`Datos guardados en la Nube: ${weekToSave}`);
                window.switchTab('dashboard'); 
            } catch (error) {
                console.error("Error guardando en Firebase: ", error);
                alert("Error al guardar en la nube.");
            }
        });

        btnClearData.addEventListener('click', async () => {
            if(confirm("¿Estás seguro de borrar todo el historial de LA NUBE? Esto no se puede deshacer y afectará a todos los usuarios.")) {
                try {
                    // Borrar todos los documentos de Firestore
                    const querySnapshot = await getDocs(collection(db, "reportes"));
                    querySnapshot.forEach(async (document) => {
                        await deleteDoc(doc(db, "reportes", document.id));
                    });

                    appData = {};
                    updatePeriodDatalist();
                    inputGlobalWeek.value = "";
                    window.loadWeekData("");
                    showToast("Historial eliminado de la nube completamente.");
                } catch (error) {
                    console.error("Error borrando datos de Firebase: ", error);
                    alert("Ocurrió un error al intentar borrar los datos.");
                }
            }
        });

        function initChart() {

            gradientGreen.addColorStop(1, 'rgba(21, 142, 69, 0.0)');

            mainChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'],
                    datasets: [{
                        label: 'Impresiones',
                        data: [0,0,0,0,0,0,0],
                        borderColor: '#158e45',
                        backgroundColor: gradientGreen,
                        borderWidth: 4,
                        pointBackgroundColor: '#ffffff',
                        pointBorderColor: '#158e45',
                        pointBorderWidth: 3,
                        pointRadius: 6,
                        pointHoverRadius: 8,
                        fill: true,
                        tension: 0.4 
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false }, tooltip: { backgroundColor: '#172e59', padding: 12, cornerRadius: 8 } },
                    scales: {
                        y: { beginAtZero: true, border: { display: false }, grid: { color: 'rgba(0,0,0,0.03)' } },
                        x: { grid: { display: false }, border: { display: false } }
                    }
                }
            });
        }

        function updateChartData(dailyData) {
            if(mainChart) {
                mainChart.data.datasets[0].data = dailyData;
                mainChart.update();
            }
        }

        window.renderComparativa = function() {
            const p1 = document.getElementById('comp-period-1').value;
            const p2 = document.getElementById('comp-period-2').value;
            const tbody = document.getElementById('comp-table-body');
            const chartContainer = document.getElementById('comp-chart-container');
            
            document.getElementById('comp-label-1').innerText = p1 || 'Período A';
            document.getElementById('comp-label-2').innerText = p2 || 'Período B';

            if(!p1 || !p2 || !appData[p1] || !appData[p2]) {
                tbody.innerHTML = '<tr><td colspan="4" class="p-6 text-center text-gray-400 font-medium">Selecciona dos períodos válidos en los menús de arriba para comparar.</td></tr>';
                chartContainer.classList.add('hidden');
                return;
            }

            chartContainer.classList.remove('hidden');

            const m1 = appData[p1].metrics;
            const m2 = appData[p2].metrics;
            const d1 = appData[p1].daily || [0,0,0,0,0,0,0];
            const d2 = appData[p2].daily || [0,0,0,0,0,0,0];

            const ctxComp = document.getElementById('compEvolucionChart').getContext('2d');
            if(!compChart) {
                compChart = new Chart(ctxComp, {
                    type: 'line',
                    data: {
                        labels: ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'],
                        datasets: [
                            {
                                label: p1,
                                data: d1,
                                borderColor: '#94a3b8',
                                backgroundColor: 'rgba(148, 163, 184, 0.1)',
                                borderWidth: 3,
                                pointBackgroundColor: '#ffffff',
                                pointBorderColor: '#94a3b8',
                                pointRadius: 4,
                                fill: true,
                                tension: 0.4
                            },
                            {
                                label: p2,
                                data: d2,
                                borderColor: '#158e45',
                                backgroundColor: 'rgba(21, 142, 69, 0.15)',
                                borderWidth: 3,
                                pointBackgroundColor: '#ffffff',
                                pointBorderColor: '#158e45',
                                pointRadius: 5,
                                fill: true,
                                tension: 0.4
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        plugins: { legend: { position: 'top', labels: { usePointStyle: true, boxWidth: 8, font: {family: 'Inter', weight: 'bold'} } }, tooltip: { backgroundColor: '#172e59', padding: 12, cornerRadius: 8, titleFont: {family: 'Inter'}, bodyFont: {family: 'Inter'} } },
                        scales: { y: { beginAtZero: true, border: { display: false }, grid: { color: 'rgba(0,0,0,0.03)' } }, x: { grid: { display: false }, border: { display: false } } }
                    }
                });
            } else {
                compChart.data.datasets[0].label = p1;
                compChart.data.datasets[0].data = d1;
                compChart.data.datasets[1].label = p2;
                compChart.data.datasets[1].data = d2;
                compChart.update();
            }

            const compareKeys = [
                { label: 'Seguidores Totales', key: 'followers' },
                { label: 'Seguidores Ganados', key: 'gained' },
                { label: 'Seguidores Perdidos', key: 'lost', invertColor: true },
                { label: 'Crecimiento Neto (Ganados - Perdidos)', key: 'net' },
                { label: 'Impresiones', key: 'impressions' },
                { label: 'Interacciones', key: 'interactions' },
                { label: 'Engagement Rate', key: 'engagement' },
                { label: 'Posts Totales', key: 'posts' },
                { label: 'Visualizaciones', key: 'views' },
                { label: 'Reacciones', key: 'reactions' },
                { label: 'Clics', key: 'clicks' }
            ];

            tbody.innerHTML = '';
            compareKeys.forEach(item => {
                let val1 = item.key === 'net' ? ((m1.gained||0) - (m1.lost||0)) : (m1[item.key] || 0);
                let val2 = item.key === 'net' ? ((m2.gained||0) - (m2.lost||0)) : (m2[item.key] || 0);
                
                let diff = val2 - val1;
                if(item.key === 'engagement') diff = parseFloat(diff.toFixed(2));
                
                let diffText = diff > 0 ? `+${diff.toLocaleString()}` : diff.toLocaleString();
                
                let colorClass = 'text-gray-500 bg-gray-50';
                if (diff > 0) colorClass = item.invertColor ? 'text-red-500 bg-red-50' : 'text-green-600 bg-green-50';
                else if (diff < 0) colorClass = item.invertColor ? 'text-green-600 bg-green-50' : 'text-red-500 bg-red-50';

                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50 transition border-b border-gray-50">
                        <td class="p-4 font-bold text-gray-600 border-r border-gray-100">${item.label}</td>
                        <td class="p-4 text-center font-medium border-r border-gray-100">${val1.toLocaleString()}</td>
                        <td class="p-4 text-center font-bold text-coosajo-blue border-r border-gray-100">${val2.toLocaleString()}</td>
                        <td class="p-4 text-center"><span class="px-2 py-1 rounded font-bold ${colorClass}">${diffText}</span></td>
                    </tr>
                `;
            });
        };

        // ==========================================
        // 11. UI Y NAVEGACIÓN
        // ==========================================
        window.switchTab = function(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('tab-' + tabId).classList.remove('hidden');

            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.className = "nav-btn w-full flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-xl text-gray-500 hover:bg-gray-50 hover:text-coosajo-blue transition-all border border-transparent";
            });
            const activeBtn = document.getElementById('nav-' + tabId);
            if (activeBtn) activeBtn.className = "nav-btn w-full flex items-center gap-3 px-4 py-3 text-sm font-semibold rounded-xl bg-coosajo-lightGreen text-coosajo-green transition-all shadow-sm border border-green-100";

            document.querySelectorAll('.mob-btn').forEach(btn => {
                btn.className = "mob-btn text-gray-400 hover:text-coosajo-blue flex flex-col items-center justify-center p-2 rounded-xl w-1/4 transition-all";
            });
            const activeMob = document.getElementById('mob-' + tabId);
            if(activeMob) activeMob.className = "mob-btn text-coosajo-green flex flex-col items-center justify-center p-2 rounded-xl w-1/4 bg-coosajo-lightGreen/50 transition-all";
        };

        document.getElementById('nav-dashboard').addEventListener('click', () => window.switchTab('dashboard'));
        document.getElementById('nav-reporte').addEventListener('click', () => window.switchTab('reporte'));
        document.getElementById('nav-comparativa').addEventListener('click', () => window.switchTab('comparativa'));
        document.getElementById('nav-ingreso').addEventListener('click', () => window.switchTab('ingreso'));
        
        document.getElementById('mob-dashboard').addEventListener('click', () => window.switchTab('dashboard'));
        document.getElementById('mob-reporte').addEventListener('click', () => window.switchTab('reporte'));
        document.getElementById('mob-comparativa').addEventListener('click', () => window.switchTab('comparativa'));
        document.getElementById('mob-ingreso').addEventListener('click', () => window.switchTab('ingreso'));

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3500);
        }

        // ==========================================
        // INICIO
        // ==========================================
        checkAuth();
    </script>
</body>
</html>
