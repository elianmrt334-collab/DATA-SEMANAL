<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard & Reportes - COOSAJO R.L.</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Kalam:wght@400&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        handwriting: ['Kalam', 'cursive'], 
                    },
                    colors: {
                        coosajo: {
                            green: '#158e45',
                            blue: '#172e59',
                            lightGreen: '#e8f5ed',
                            lightBlue: '#eef2f9',
                            hoverGreen: '#127a3b'
                        },
                        note: '#fffbeb' 
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .bg-gradient-main { background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }
        .note-area {
            background-color: #fffdf0;
            background-image: linear-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 100% 1.75rem;
            line-height: 1.75rem;
            border: 1px solid #fde68a;
            resize: vertical;
        }
        .nav-btn.active {
            background-color: #158e45;
            color: white !important;
            box-shadow: 0 4px 12px rgba(21, 142, 69, 0.2);
        }
    </style>
</head>
<body class="text-gray-800 antialiased h-screen flex flex-col overflow-hidden bg-gradient-main">

    <!-- PANTALLA DE LOGIN -->
    <div id="login-screen" class="absolute inset-0 z-50 flex items-center justify-center bg-gradient-to-br from-coosajo-blue to-[#0e1d38] p-4 transition-opacity duration-500">
        <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md transform transition-all">
            <div class="flex justify-center mb-6">
                <img src="LOGO COOSAJO SIN ESLOGAN.png" alt="COOSAJO Logo" class="h-16 object-contain" onerror="this.outerHTML='<i class=\'fa-solid fa-leaf text-coosajo-green text-5xl\'></i>'">
            </div>
            <h2 class="text-2xl font-extrabold text-coosajo-blue text-center mb-2">Iniciar Sesión</h2>
            <form id="login-form" class="space-y-5">
                <input type="text" id="login-user" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-coosajo-green outline-none" placeholder="Usuario">
                <input type="password" id="login-pass" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-coosajo-green outline-none" placeholder="Contraseña">
                <button type="submit" class="w-full bg-gradient-to-r from-coosajo-green to-green-600 text-white font-bold py-3.5 rounded-xl shadow-lg hover:scale-[1.02] transition-transform mt-4">Ingresar</button>
            </form>
        </div>
    </div>

    <!-- CONTENIDO DE LA APP -->
    <div id="app-content" class="hidden flex-col h-full w-full">
        <nav class="bg-coosajo-blue text-white shadow-lg z-20 flex-shrink-0 relative h-16 flex items-center px-6">
            <div class="flex items-center justify-between w-full">
                <div class="bg-white p-1 rounded-lg">
                    <img src="LOGO COOSAJO SIN ESLOGAN.png" alt="COOSAJO Logo" class="h-8 object-contain">
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2 bg-white/10 px-3 py-1.5 rounded-lg border border-white/20">
                        <i class="fa-solid fa-calendar-days text-coosajo-green"></i>
                        <input type="text" id="global-week-selector" list="period-list" class="bg-transparent border-none text-white text-sm font-bold focus:outline-none w-40" placeholder="Período">
                        <datalist id="period-list"></datalist>
                    </div>
                    <button id="btn-logout" class="w-9 h-9 rounded-full bg-coosajo-green flex items-center justify-center font-bold">E</button>
                </div>
            </div>
            <div class="absolute inset-x-0 bottom-0 h-1 bg-gradient-to-r from-coosajo-green to-coosajo-blue"></div>
        </nav>

        <div class="flex flex-1 overflow-hidden">
            <!-- Sidebar -->
            <aside class="w-64 bg-white/80 border-r border-gray-200 flex flex-col p-5 space-y-2">
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 ml-2">Menú Principal</p>
                <button onclick="switchTab('dashboard')" id="nav-dashboard" class="nav-btn active w-full flex items-center gap-3 px-4 py-3 text-sm font-semibold rounded-xl text-gray-500 transition-all hover:bg-gray-100">
                    <i class="fa-solid fa-chart-pie"></i> Dashboard
                </button>
                <button onclick="switchTab('demografia')" id="nav-demografia" class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-sm font-semibold rounded-xl text-gray-500 transition-all hover:bg-gray-100">
                    <i class="fa-solid fa-users-viewfinder"></i> Demografía
                </button>
                <button onclick="switchTab('ingreso')" id="nav-ingreso" class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-sm font-semibold rounded-xl text-gray-500 transition-all hover:bg-gray-100">
                    <i class="fa-solid fa-keyboard"></i> Ingreso Manual
                </button>
            </aside>

            <!-- Workspace -->
            <main class="flex-1 overflow-y-auto p-8">
                
                <!-- DASHBOARD -->
                <div id="tab-dashboard" class="tab-content fade-in space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-5">
                        <div class="glass-card p-6 rounded-2xl border-l-4 border-coosajo-blue">
                            <p class="text-xs text-gray-400 font-bold">Seguidores</p>
                            <h3 class="text-3xl font-black text-coosajo-blue" id="val-followers">0</h3>
                        </div>
                        <div class="glass-card p-6 rounded-2xl border-l-4 border-coosajo-green">
                            <p class="text-xs text-gray-400 font-bold">Impresiones</p>
                            <h3 class="text-3xl font-black text-coosajo-green" id="val-impressions">0</h3>
                        </div>
                        <div class="glass-card p-6 rounded-2xl border-l-4 border-coosajo-blue">
                            <p class="text-xs text-gray-400 font-bold">Interacciones</p>
                            <h3 class="text-3xl font-black text-coosajo-blue" id="val-interactions">0</h3>
                        </div>
                        <div class="glass-card p-6 rounded-2xl border-l-4 border-coosajo-green">
                            <p class="text-xs text-gray-400 font-bold">Engagement</p>
                            <h3 class="text-3xl font-black text-gray-800" id="val-engagement">0%</h3>
                        </div>
                    </div>
                    <div class="glass-card p-6 rounded-3xl h-80"><canvas id="mainChart"></canvas></div>
                </div>

                <!-- DEMOGRAFÍA -->
                <div id="tab-demografia" class="tab-content hidden fade-in space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="glass-card p-8 rounded-3xl flex flex-col items-center">
                            <h3 class="font-bold mb-6 text-coosajo-blue self-start">Departamentos de Guatemala</h3>
                            <div class="w-full max-w-sm"><canvas id="chartGua"></canvas></div>
                        </div>
                        <div class="glass-card p-8 rounded-3xl flex flex-col items-center">
                            <h3 class="font-bold mb-6 text-coosajo-green self-start">Distribución por Países</h3>
                            <div class="w-full max-w-sm"><canvas id="chartCountry"></canvas></div>
                        </div>
                    </div>
                </div>

                <!-- INGRESO MANUAL -->
                <div id="tab-ingreso" class="tab-content hidden fade-in space-y-6">
                    <div class="glass-card p-8 rounded-[2rem] border-t-8 border-coosajo-green space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-xs font-bold text-gray-400 mb-2">Nombre del Período</label>
                                <input type="text" id="f-week" class="w-full p-3 bg-gray-50 border rounded-xl font-bold">
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <input type="number" id="f-followers" placeholder="Seguidores" class="p-3 bg-gray-50 border rounded-xl">
                                <input type="number" id="f-impressions" placeholder="Impresiones" class="p-3 bg-gray-50 border rounded-xl">
                            </div>
                        </div>

                        <!-- MODULO DEMOGRAFICO MANUAL -->
                        <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                            <h4 class="font-bold text-sm text-coosajo-blue mb-4">Ingreso de Datos Demográficos</h4>
                            <div class="flex flex-wrap gap-2 mb-4">
                                <select id="d-type" class="p-2 text-xs rounded border outline-none">
                                    <option value="gua">Guatemala (Depto)</option>
                                    <option value="country">País Exterior</option>
                                </select>
                                <input type="text" id="d-label" placeholder="Nombre" class="flex-1 p-2 text-xs rounded border">
                                <input type="number" id="d-val" placeholder="Cantidad" class="w-24 p-2 text-xs rounded border">
                                <button onclick="addDemoData()" class="bg-coosajo-blue text-white px-4 rounded-lg text-xs font-bold shadow-md hover:bg-slate-800">+</button>
                            </div>
                            <div id="temp-list" class="grid grid-cols-1 md:grid-cols-2 gap-2 max-h-32 overflow-y-auto text-[10px]"></div>
                        </div>

                        <div class="grid grid-cols-7 gap-2">
                            <input type="number" id="d1" placeholder="Lun" class="p-2 border rounded-lg text-center text-xs">
                            <input type="number" id="d2" placeholder="Mar" class="p-2 border rounded-lg text-center text-xs">
                            <input type="number" id="d3" placeholder="Mie" class="p-2 border rounded-lg text-center text-xs">
                            <input type="number" id="d4" placeholder="Jue" class="p-2 border rounded-lg text-center text-xs">
                            <input type="number" id="d5" placeholder="Vie" class="p-2 border rounded-lg text-center text-xs">
                            <input type="number" id="d6" placeholder="Sab" class="p-2 border rounded-lg text-center text-xs">
                            <input type="number" id="d7" placeholder="Dom" class="p-2 border rounded-lg text-center text-xs">
                        </div>

                        <button onclick="saveAll()" class="w-full py-4 bg-coosajo-green text-white font-black rounded-2xl shadow-xl hover:scale-[1.01] transition-all">
                            GUARDAR DATOS DEL PERÍODO
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('coosajo_v5_data')) || {
            "Semana de Mayo": {
                metrics: { followers: 56500, impressions: 450000, interactions: 18000, engagement: 8.5 },
                daily: [5000, 6000, 5500, 7000, 8000, 12000, 10000],
                demographics: {
                    gua: [{l: 'Chiquimula', v: 40000}, {l: 'Zacapa', v: 8000}, {l: 'Jalapa', v: 5000}],
                    country: [{l: 'Guatemala', v: 53000}, {l: 'USA', v: 2500}, {l: 'Honduras', v: 1000}]
                }
            }
        };

        let tempDemo = { gua: [], country: [] };
        let charts = {};

        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
            updateUI();
            
            document.getElementById('login-form').addEventListener('submit', (e) => {
                e.preventDefault();
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-content').classList.replace('hidden', 'flex');
                loadData(Object.keys(db)[0]);
            });
        });

        function initCharts() {
            charts.main = new Chart(document.getElementById('mainChart').getContext('2d'), {
                type: 'line',
                data: { labels: ['Lun', 'Mar', 'Mie', 'Jue', 'Vie', 'Sab', 'Dom'], datasets: [{ label: 'Imp', data: [], borderColor: '#158e45', tension: 0.4, fill: true, backgroundColor: 'rgba(21, 142, 69, 0.05)' }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            const pieConfig = (id, colors) => ({
                type: 'doughnut',
                data: { labels: [], datasets: [{ data: [], backgroundColor: colors, borderWidth: 0 }] },
                options: { responsive: true, cutout: '70%', plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } } }
            });

            charts.gua = new Chart(document.getElementById('chartGua'), pieConfig('gua', ['#172e59', '#158e45', '#334155', '#94a3b8', '#cbd5e1', '#818cf8']));
            charts.country = new Chart(document.getElementById('chartCountry'), pieConfig('country', ['#158e45', '#172e59', '#6366f1', '#f59e0b', '#ec4899', '#94a3b8']));
        }

        function addDemoData() {
            const type = document.getElementById('d-type').value;
            const l = document.getElementById('d-label').value;
            const v = parseInt(document.getElementById('d-val').value);
            if(!l || isNaN(v)) return;
            tempDemo[type].push({l, v});
            renderTempList();
            document.getElementById('d-label').value = ""; document.getElementById('d-val').value = "";
        }

        function renderTempList() {
            const div = document.getElementById('temp-list');
            div.innerHTML = "";
            ['gua', 'country'].forEach(t => tempDemo[t].forEach((i, idx) => {
                div.innerHTML += `<div class="flex justify-between bg-white p-2 border rounded"><span>${t.toUpperCase()}: ${i.l}</span><b>${i.v}</b></div>`;
            }));
        }

        function saveAll() {
            const w = document.getElementById('f-week').value;
            if(!w) return alert("Nombre de semana requerido");
            db[w] = {
                metrics: { followers: parseInt(document.getElementById('f-followers').value)||0, impressions: parseInt(document.getElementById('f-impressions').value)||0, interactions: 15000, engagement: 7.5 },
                daily: [1,2,3,4,5,6,7].map(i => parseInt(document.getElementById('d'+i).value)||0),
                demographics: JSON.parse(JSON.stringify(tempDemo))
            };
            localStorage.setItem('coosajo_v5_data', JSON.stringify(db));
            updateUI();
            alert("Período Guardado");
            tempDemo = { gua: [], country: [] };
            renderTempList();
            loadData(w);
            switchTab('dashboard');
        }

        function loadData(w) {
            const d = db[w]; if(!d) return;
            document.getElementById('val-followers').innerText = d.metrics.followers.toLocaleString();
            document.getElementById('val-impressions').innerText = (d.metrics.impressions/1000).toFixed(1) + "K";
            document.getElementById('val-interactions').innerText = d.metrics.interactions.toLocaleString();
            document.getElementById('val-engagement').innerText = d.metrics.engagement + "%";
            charts.main.data.datasets[0].data = d.daily; charts.main.update();
            ['gua', 'country'].forEach(id => {
                charts[id].data.labels = d.demographics[id].map(i => i.l);
                charts[id].data.datasets[0].data = d.demographics[id].map(i => i.v);
                charts[id].update();
            });
            document.getElementById('global-week-selector').value = w;
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('nav-' + id).classList.add('active');
        }

        function updateUI() {
            const sel = document.getElementById('global-week-selector');
            const list = document.getElementById('period-list');
            const keys = Object.keys(db);
            list.innerHTML = keys.map(k => `<option value="${k}">`).join('');
            sel.value = keys[keys.length-1];
        }

        document.getElementById('global-week-selector').addEventListener('change', (e) => loadData(e.target.value));
        document.getElementById('btn-logout').addEventListener('click', () => location.reload());
    </script>
</body>
</html>
