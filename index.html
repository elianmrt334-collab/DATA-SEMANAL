<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Analítico - COOSAJO R.L.</title>
    
    <!-- Frameworks y Librerías -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Kalam:wght@400&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        handwriting: ['Kalam', 'cursive'], 
                    },
                    colors: {
                        coosajo: {
                            green: '#158e45',
                            blue: '#172e59',
                            lightGreen: '#e8f5ed',
                            lightBlue: '#eef2f9',
                            hoverGreen: '#127a3b'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 20px -5px rgba(0, 0, 0, 0.05);
        }
        .sidebar-active {
            background-color: #158e45;
            color: white !important;
        }
        .note-area {
            background-color: #fffdf0;
            background-image: linear-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 100% 1.75rem;
            line-height: 1.75rem;
            border: 1px solid #fde68a;
        }
        /* Animaciones */
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-gray-800 antialiased h-screen flex overflow-hidden">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="absolute inset-0 z-50 flex items-center justify-center bg-coosajo-blue p-4">
        <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md">
            <div class="flex justify-center mb-6">
                <img src="LOGO%20COOSAJO%20SIN%20ESLOGAN.png" alt="Logo" class="h-16" onerror="this.outerHTML='<i class=\'fa-solid fa-leaf text-coosajo-green text-5xl\'></i>'">
            </div>
            <h2 class="text-2xl font-bold text-coosajo-blue text-center mb-6">Panel de Control</h2>
            <form id="login-form" class="space-y-4">
                <input type="text" id="login-user" required class="w-full p-4 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-coosajo-green" placeholder="Usuario">
                <input type="password" id="login-pass" required class="w-full p-4 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-coosajo-green" placeholder="Contraseña">
                <button type="submit" class="w-full bg-coosajo-green text-white font-bold py-4 rounded-xl hover:bg-coosajo-hoverGreen transition-all">Ingresar</button>
            </form>
        </div>
    </div>

    <!-- MAIN APP LAYOUT -->
    <div id="app-content" class="hidden flex h-full w-full">
        
        <!-- SIDEBAR -->
        <aside class="w-64 bg-coosajo-blue text-white flex flex-col flex-shrink-0 shadow-xl">
            <div class="p-6 border-b border-white/10 flex items-center gap-3">
                <div class="bg-white p-1 rounded-lg w-10 h-10 flex items-center justify-center">
                    <img src="LOGO%20COOSAJO%20SIN%20ESLOGAN.png" class="h-6" onerror="this.style.display='none'">
                </div>
                <span class="font-bold tracking-tight">COOSAJO R.L.</span>
            </div>
            <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
                <button onclick="switchTab('dashboard')" id="nav-dashboard" class="sidebar-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white transition-all sidebar-active">
                    <i class="fa-solid fa-chart-line"></i> Dashboard
                </button>
                <button onclick="switchTab('demographics')" id="nav-demographics" class="sidebar-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white transition-all">
                    <i class="fa-solid fa-users"></i> Demografía
                </button>
                <button onclick="switchTab('ingreso')" id="nav-ingreso" class="sidebar-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white transition-all">
                    <i class="fa-solid fa-pen-to-square"></i> Ingreso de Datos
                </button>
            </nav>
            <div class="p-4 border-t border-white/10">
                <button onclick="logout()" class="flex items-center gap-3 text-red-400 px-4 py-2 hover:bg-red-500/10 rounded-lg w-full">
                    <i class="fa-solid fa-power-off"></i> Cerrar Sesión
                </button>
            </div>
        </aside>

        <!-- CONTENT AREA -->
        <main class="flex-1 flex flex-col min-w-0 bg-gray-50 overflow-hidden">
            
            <!-- TOP BAR -->
            <header class="h-16 bg-white border-b flex items-center justify-between px-8 flex-shrink-0">
                <h2 id="view-title" class="text-xl font-bold text-coosajo-blue">Dashboard Analítico</h2>
                <div class="flex items-center gap-4">
                    <select id="global-week-selector" onchange="loadWeekData(this.value)" class="bg-gray-100 border-none rounded-lg text-sm px-4 py-2 outline-none focus:ring-2 focus:ring-coosajo-green">
                        <!-- Opciones dinámicas -->
                    </select>
                    <div id="user-initials" class="w-9 h-9 rounded-full bg-coosajo-green text-white flex items-center justify-center font-bold text-sm shadow-md">
                        U
                    </div>
                </div>
            </header>

            <!-- SCROLLABLE CONTENT -->
            <div class="flex-1 overflow-y-auto p-8">
                
                <!-- TAB: DASHBOARD -->
                <div id="tab-dashboard" class="tab-content fade-in space-y-6">
                    <!-- KPI Cards -->
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <div class="glass-card p-6 rounded-2xl">
                            <p class="text-xs font-bold text-gray-400 uppercase">Seguidores</p>
                            <h3 id="val-followers" class="text-3xl font-black text-coosajo-blue mt-1">0</h3>
                        </div>
                        <div class="glass-card p-6 rounded-2xl">
                            <p class="text-xs font-bold text-gray-400 uppercase">Impresiones</p>
                            <h3 id="val-impressions" class="text-3xl font-black text-coosajo-green mt-1">0</h3>
                        </div>
                        <div class="glass-card p-6 rounded-2xl border-b-4 border-coosajo-green">
                            <p class="text-xs font-bold text-gray-400 uppercase">Engagement</p>
                            <h3 id="val-engagement" class="text-3xl font-black text-gray-800 mt-1">0%</h3>
                        </div>
                        <div class="glass-card p-6 rounded-2xl">
                            <p class="text-xs font-bold text-gray-400 uppercase">Interacciones</p>
                            <h3 id="val-interactions" class="text-3xl font-black text-coosajo-blue mt-1">0</h3>
                        </div>
                    </div>

                    <!-- Gráfico Principal -->
                    <div class="glass-card p-6 rounded-2xl">
                        <h4 class="font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-wave-square text-coosajo-green"></i> Rendimiento Semanal</h4>
                        <div class="h-64"><canvas id="mainChart"></canvas></div>
                    </div>
                </div>

                <!-- TAB: DEMOGRAFÍA (NUEVO) -->
                <div id="tab-demographics" class="tab-content fade-in hidden space-y-6">
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <!-- Pastel Guatemala -->
                        <div class="glass-card p-6 rounded-2xl flex flex-col items-center">
                            <h4 class="font-bold mb-6 text-coosajo-blue"><i class="fa-solid fa-map-location-dot"></i> Departamentos de Guatemala</h4>
                            <div class="w-full max-w-[300px]"><canvas id="chartGua"></canvas></div>
                        </div>
                        <!-- Pastel Países -->
                        <div class="glass-card p-6 rounded-2xl flex flex-col items-center">
                            <h4 class="font-bold mb-6 text-coosajo-green"><i class="fa-solid fa-earth-americas"></i> Distribución por Países</h4>
                            <div class="w-full max-w-[300px]"><canvas id="chartCountries"></canvas></div>
                        </div>
                    </div>
                </div>

                <!-- TAB: INGRESO DE DATOS -->
                <div id="tab-ingreso" class="tab-content fade-in hidden">
                    <div class="max-w-4xl mx-auto space-y-6">
                        <div class="glass-card p-8 rounded-3xl space-y-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="col-span-2">
                                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Nombre del Período</label>
                                    <input type="text" id="form-week" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-coosajo-green" placeholder="Ej: 01 al 07 de Mayo">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Seguidores Totales</label>
                                    <input type="number" id="form-followers" class="w-full p-3 bg-gray-50 border border-gray-100 rounded-xl outline-none">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Impresiones</label>
                                    <input type="number" id="form-impressions" class="w-full p-3 bg-gray-50 border border-gray-100 rounded-xl outline-none">
                                </div>
                            </div>

                            <!-- INGRESO DEMOGRÁFICO MANUAL -->
                            <div class="pt-6 border-t border-gray-100">
                                <h4 class="font-bold text-coosajo-blue mb-4">Ingreso de Datos Demográficos</h4>
                                <div class="grid grid-cols-1 md:grid-cols-4 gap-3 mb-4">
                                    <select id="form-demo-type" class="p-3 bg-gray-50 rounded-xl outline-none text-sm">
                                        <option value="gua">Guatemala (Depto)</option>
                                        <option value="country">País</option>
                                    </select>
                                    <input type="text" id="form-demo-name" class="md:col-span-2 p-3 bg-gray-50 rounded-xl outline-none text-sm" placeholder="Nombre (Chiquimula, USA, etc.)">
                                    <input type="number" id="form-demo-val" class="p-3 bg-gray-50 rounded-xl outline-none text-sm" placeholder="%">
                                </div>
                                <button onclick="addDemographic()" class="w-full py-2 bg-coosajo-blue text-white rounded-xl text-sm font-bold hover:bg-slate-800 transition-all">+ Agregar a la lista</button>
                                
                                <div class="mt-4 bg-gray-50 rounded-xl p-4 min-h-[100px]">
                                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-2">Lista temporal para este período:</p>
                                    <div id="demo-list-preview" class="flex flex-wrap gap-2"></div>
                                </div>
                            </div>

                            <button onclick="saveFullPeriod()" class="w-full py-4 bg-coosajo-green text-white font-black rounded-2xl shadow-lg hover:translate-y-[-2px] transition-all">
                                GUARDAR PERÍODO COMPLETO
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- SCRIPT PRINCIPAL -->
    <script>
        // BASE DE DATOS LOCAL
        let appData = JSON.parse(localStorage.getItem('coosajo_db_v2')) || {
            "Semana Ejemplo": {
                metrics: { followers: 56500, impressions: 480000, interactions: 18000, engagement: 8.2 },
                daily: [2500, 3100, 2800, 4500, 5200, 6800, 5900],
                demographics: {
                    gua: { labels: ["Chiquimula", "Zacapa", "Jalapa"], data: [60, 25, 15] },
                    countries: { labels: ["Guatemala", "USA", "Honduras"], data: [85, 10, 5] }
                }
            }
        };

        let tempDemo = { gua: { labels: [], data: [] }, countries: { labels: [], data: [] } };
        let charts = {};

        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
            updateSelectors();
            checkAuth();
            
            // Login Logic
            document.getElementById('login-form').addEventListener('submit', (e) => {
                e.preventDefault();
                sessionStorage.setItem('logged', 'true');
                checkAuth();
            });
        });

        function initCharts() {
            // Main Line Chart
            charts.main = new Chart(document.getElementById('mainChart'), {
                type: 'line',
                data: {
                    labels: ['Lun', 'Mar', 'Mie', 'Jue', 'Vie', 'Sab', 'Dom'],
                    datasets: [{ label: 'Interacciones', data: [], borderColor: '#158e45', tension: 0.4, fill: true, backgroundColor: 'rgba(21, 142, 69, 0.05)' }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            // Pie Charts
            const pieOptions = { responsive: true, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } } };
            
            charts.gua = new Chart(document.getElementById('chartGua'), {
                type: 'doughnut',
                data: { labels: [], datasets: [{ data: [], backgroundColor: ['#172e59', '#158e45', '#3b82f6', '#fbbf24', '#f87171'] }] },
                options: pieOptions
            });

            charts.countries = new Chart(document.getElementById('chartCountries'), {
                type: 'doughnut',
                data: { labels: [], datasets: [{ data: [], backgroundColor: ['#158e45', '#172e59', '#6366f1', '#f59e0b', '#ec4899'] }] },
                options: pieOptions
            });
        }

        function checkAuth() {
            if(sessionStorage.getItem('logged')) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                loadWeekData(Object.keys(appData)[0]);
            }
        }

        function updateSelectors() {
            const sel = document.getElementById('global-week-selector');
            sel.innerHTML = Object.keys(appData).map(w => `<option value="${w}">${w}</option>`).join('');
        }

        function loadWeekData(week) {
            const data = appData[week];
            if(!data) return;

            // Update KPIs
            document.getElementById('val-followers').innerText = data.metrics.followers.toLocaleString();
            document.getElementById('val-impressions').innerText = (data.metrics.impressions / 1000).toFixed(1) + "K";
            document.getElementById('val-interactions').innerText = data.metrics.interactions.toLocaleString();
            document.getElementById('val-engagement').innerText = data.metrics.engagement + "%";

            // Update Line Chart
            charts.main.data.datasets[0].data = data.daily;
            charts.main.update();

            // Update Pie Charts
            charts.gua.data.labels = data.demographics.gua.labels;
            charts.gua.data.datasets[0].data = data.demographics.gua.data;
            charts.gua.update();

            charts.countries.data.labels = data.demographics.countries.labels;
            charts.countries.data.datasets[0].data = data.demographics.countries.data;
            charts.countries.update();
        }

        // ENTRY LOGIC
        function addDemographic() {
            const type = document.getElementById('form-demo-type').value;
            const name = document.getElementById('form-demo-name').value;
            const val = document.getElementById('form-demo-val').value;

            if(!name || !val) return;

            const target = type === 'gua' ? tempDemo.gua : tempDemo.countries;
            target.labels.push(name);
            target.data.push(Number(val));

            // UI Feedback
            const badge = document.createElement('span');
            badge.className = `px-3 py-1 rounded-full text-[10px] font-bold ${type==='gua'?'bg-blue-100 text-coosajo-blue':'bg-green-100 text-coosajo-green'}`;
            badge.innerText = `${name} (${val}%)`;
            document.getElementById('demo-list-preview').appendChild(badge);

            // Clean
            document.getElementById('form-demo-name').value = "";
            document.getElementById('form-demo-val').value = "";
        }

        function saveFullPeriod() {
            const week = document.getElementById('form-week').value;
            if(!week) return alert("Ingresa el nombre del período");

            appData[week] = {
                metrics: {
                    followers: Number(document.getElementById('form-followers').value) || 0,
                    impressions: Number(document.getElementById('form-impressions').value) || 0,
                    interactions: Math.floor(Math.random() * 20000), // Simulado para el ejemplo
                    engagement: (Math.random() * 10).toFixed(1)
                },
                daily: Array.from({length: 7}, () => Math.floor(Math.random() * 5000)),
                demographics: JSON.parse(JSON.stringify(tempDemo))
            };

            localStorage.setItem('coosajo_db_v2', JSON.stringify(appData));
            updateSelectors();
            tempDemo = { gua: { labels: [], data: [] }, countries: { labels: [], data: [] } };
            document.getElementById('demo-list-preview').innerHTML = "";
            alert("¡Período guardado!");
            switchTab('dashboard');
            loadWeekData(week);
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
            
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('sidebar-active'));
            document.getElementById('nav-' + id).classList.add('sidebar-active');

            const titles = { dashboard: "Dashboard Analítico", demographics: "Distribución Demográfica", ingreso: "Ingreso Manual de Datos" };
            document.getElementById('view-title').innerText = titles[id];
        }

        function logout() {
            sessionStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
