<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Integral Firebase - COOSAJO R.L.</title>
    
    <!-- Scripts de Firebase (Versión de Compatibilidad para HTML Estático) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Kalam:wght@400&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], handwriting: ['Kalam', 'cursive'] },
                    colors: {
                        coosajo: {
                            green: '#158e45', blue: '#172e59',
                            lightGreen: '#e8f5ed', lightBlue: '#eef2f9',
                            hoverGreen: '#127a3b'
                        },
                        note: '#fffbeb'
                    }
                }
            }
        }
    </script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .bg-gradient-main { background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .nav-btn.active { background-color: #e8f5ed; color: #158e45; border-left: 4px solid #158e45; font-weight: 700; }
        .note-area { background-color: #fffdf0; background-image: linear-gradient(#e5e7eb 1px, transparent 1px); background-size: 100% 1.75rem; line-height: 1.75rem; border: 1px solid #fde68a; resize: vertical; }
        .img-preview { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; background-color: #f1f5f9; }
    </style>
</head>
<body class="text-gray-800 antialiased h-screen flex flex-col overflow-hidden bg-gradient-main">

    <!-- CONFIGURACIÓN DE FIREBASE (PEGA TUS DATOS AQUÍ) -->
    <script>
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            projectId: "TU_PROYECTO_ID",
            storageBucket: "TU_PROYECTO.appspot.com",
            messagingSenderId: "TU_SENDER_ID",
            appId: "TU_APP_ID"
        };
        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
    </script>

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="absolute inset-0 z-50 flex items-center justify-center bg-gradient-to-br from-coosajo-blue to-[#0e1d38] p-4">
        <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md">
            <div class="flex justify-center mb-6">
                <img src="LOGO%20COOSAJO%20SIN%20ESLOGAN.png" alt="COOSAJO Logo" class="h-16" onerror="this.outerHTML='<i class=\'fa-solid fa-leaf text-coosajo-green text-5xl\'></i>'">
            </div>
            <h2 class="text-2xl font-extrabold text-coosajo-blue text-center mb-6">Acceso en la Nube</h2>
            <form id="login-form" class="space-y-4">
                <div id="login-err" class="hidden text-red-500 text-xs text-center font-bold">Error de acceso a Firebase</div>
                <input type="email" id="login-email" required class="w-full p-4 rounded-xl border border-gray-200 outline-none" placeholder="Email corporativo">
                <input type="password" id="login-pass" required class="w-full p-4 rounded-xl border border-gray-200 outline-none" placeholder="Contraseña">
                <button type="submit" class="w-full bg-coosajo-green text-white font-bold py-4 rounded-xl shadow-lg hover:opacity-90">Ingresar</button>
            </form>
        </div>
    </div>

    <!-- APP CONTENT -->
    <div id="app-content" class="hidden flex-col h-full w-full">
        <!-- Navegación superior y Sidebar igual al original -->
        <nav class="bg-coosajo-blue text-white shadow-lg z-20 flex-shrink-0 relative h-16 flex items-center px-6">
            <div class="flex items-center justify-between w-full">
                <div class="bg-white p-1 rounded-lg"><img src="LOGO%20COOSAJO%20SIN%20ESLOGAN.png" class="h-8"></div>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2 bg-white/10 px-3 py-1.5 rounded-lg border border-white/20">
                        <i class="fa-solid fa-calendar text-coosajo-green"></i>
                        <select id="global-week-selector" class="bg-transparent border-none text-white text-sm font-bold focus:outline-none w-48"></select>
                    </div>
                    <div id="user-display" class="flex items-center gap-2">
                        <span id="user-name-tag" class="text-xs font-bold text-gray-300"></span>
                        <div id="btn-logout" class="w-9 h-9 rounded-full bg-coosajo-green flex items-center justify-center font-bold cursor-pointer">E</div>
                    </div>
                </div>
            </div>
        </nav>

        <div class="flex flex-1 overflow-hidden">
            <aside class="w-64 bg-white/80 border-r border-gray-200 flex flex-col flex-shrink-0">
                <div class="p-5 overflow-y-auto h-full">
                    <nav class="space-y-1">
                        <button onclick="switchTab('dashboard')" id="nav-dashboard" class="nav-btn active w-full flex items-center gap-3 px-4 py-3 text-sm rounded-xl text-gray-500">
                            <i class="fa-solid fa-chart-pie"></i> Dashboard
                        </button>
                        <button onclick="switchTab('demografia')" id="nav-demografia" class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-sm rounded-xl text-gray-500">
                            <i class="fa-solid fa-users"></i> Demografía
                        </button>
                        <button onclick="switchTab('reporte')" id="nav-reporte" class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-sm rounded-xl text-gray-500">
                            <i class="fa-solid fa-star"></i> Top 10 Posts
                        </button>
                        <button onclick="switchTab('ingreso')" id="nav-ingreso" class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-sm rounded-xl text-gray-500">
                            <i class="fa-solid fa-pen-to-square"></i> Ingreso Manual
                        </button>
                        <button onclick="switchTab('admin')" id="nav-admin" class="hidden nav-btn w-full flex items-center gap-3 px-4 py-3 text-sm rounded-xl text-coosajo-blue">
                            <i class="fa-solid fa-user-gear"></i> Gestión Usuarios
                        </button>
                    </nav>
                </div>
            </aside>

            <main class="flex-1 overflow-y-auto p-8 bg-slate-50/50" id="main-area">
                <!-- Secciones idénticas al código anterior (Dashboard, Demografía, Top 10, etc.) -->
                <!-- [...] El resto del HTML se mantiene intacto para conservar tu diseño exacto -->
            </main>
        </div>
    </div>

    <script>
        // LÓGICA DE FIREBASE PARA SESIÓN
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, pass);
                initApp(userCredential.user);
            } catch (error) {
                document.getElementById('login-err').innerText = "Acceso denegado: " + error.message;
                document.getElementById('login-err').classList.remove('hidden');
            }
        };

        function initApp(user) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-content').classList.replace('hidden', 'flex');
            document.getElementById('user-name-tag').innerText = user.email;

            // Privilegios para sjemartinez
            if(user.email.includes('sjemartinez')) {
                document.getElementById('nav-admin').classList.remove('hidden');
            }
            fetchCloudData();
        }

        async function fetchCloudData() {
            // Aquí llamarías a Firestore para cargar los reportes guardados en la nube
            const querySnapshot = await db.collection("reportes").get();
            // Lógica para poblar el dashboard con datos de Firebase
        }
    </script>
</body>
</html>
